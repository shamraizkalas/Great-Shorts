name: Build and Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace || ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          tag_name: v1.0.0
          body: |
            # 🎉 Great Shorts v1.0.0 Release
            
            ## 📱 Earn Money by Watching Videos
            ویڈیوز دیکھ کر پیسے کمائیں
            
            ## ✨ Features:
            - 💰 Earn Money
            - 🎬 Watch Short Videos  
            - 👥 Referral System
            - ⚙️ Admin Panel
            - 🌐 Bilingual (English/Urdu)
            
            ## 📥 Installation:
            1. Download APK file
            2. Enable "Unknown Sources" in Settings
            3. Install APK
            4. Launch and Enjoy!
            
            ## 📝 Release Date:
            27 June 2026
            
            ---
            **Download اور enjoy کریں!** 🚀
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK (Clean)
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --no-build-cache -x lint
        timeout-minutes: 30

      - name: Find APK
        if: success()
        run: find . -name '*.apk' -type f

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.0
          name: "Great Shorts v1.0.0 - APK"
          body: |
            # 🎉 Great Shorts v1.0.0

            ## ویڈیوز دیکھ کر پیسے کمائیں!

            ### 📥 انسٹالیشن:
            1. APK ڈاؤن لوڈ کریں
            2. Settings > Security > Unknown Sources ON کریں
            3. APK انسٹال کریں
            4. ایپ کھولیں اور شروع کریں!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
